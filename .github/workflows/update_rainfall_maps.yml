name: Update Rainfall Maps - Staggered

on:
  schedule:
    - cron: '10 3,9,15,21 * * *'
  workflow_dispatch:

jobs:
  rainfall-maps:
    runs-on: ubuntu-latest

    env:
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install folium requests tenacity numpy matplotlib

      # -------------------------
      # MAP GROUP A
      # -------------------------
      - name: Run Map Group A
        run: python generate_map_a.py

      # ✅ 1-minute delay
      - name: Wait 1 minute before Group B
        run: sleep 60

      # -------------------------
      # MAP GROUP B
      # -------------------------
      - name: Run Map Group B
        run: python generate_map_b.py

      # ✅ 1-minute delay
      - name: Wait 1 minute before Group C
        run: sleep 60

      # -------------------------
      # MAP GROUP C
      # -------------------------
      - name: Run Map Group C
        run: python generate_map_c.py

      # -------------------------
      # COMMIT ONCE
      # -------------------------
      - name: Commit & Push All Maps
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          git add *.html colorbar_*.png idw_*.png || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Rainfall Maps - $(date +'%Y-%m-%d %H:%M %Z')"
            git push origin main
            echo "✅ Changes pushed"
          fi
